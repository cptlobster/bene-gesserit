
on:
  push:
    branches:
      - 'main'
    paths:
      - ".forgejo/workflows/*"
      - "src/*"
      - "static/*"
      - "templates/*"
      - "Dockerfile"
      - ".dockerignore"
      - "Cargo.*"
      - "overseer.sh"

jobs:
  build:
    runs-on: docker
    container:
      image: docker:cli
    steps:
      - name: "Install Git and NodeJS"
        run: "apk add git nodejs"
      - name: "Checkout"
        uses: "actions/checkout@v4"
      - name: "Login to Forge Packages"
        uses: "docker/login-action@v3"
        with:
          registry: "forge.cptlobster.dev"
          username: "cptlobster"
          password: ${{ secrets.PACKAGE_TOKEN }}
      - name: "Build and Push (Minimal)"
        uses: "docker/build-push-action@v6"
        with:
          push: true
          tags: "forge.cptlobster.dev/cptlobster/bene-gesserit:latest"
      - name: "Build and Push (Full)"
        uses: "docker/build-push-action@v6"
        with:
          push: true
          tags: "forge.cptlobster.dev/cptlobster/bene-gesserit:full"