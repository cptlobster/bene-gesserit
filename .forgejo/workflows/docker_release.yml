
on:
  push:
    tags:
     - "v*"

jobs:
  build:
    runs-on: docker
    container:
      image: docker:cli
    steps:
      - name: "Install Git and NodeJS"
        run: "apk add git nodejs"
      - name: "Checkout"
        uses: "actions/checkout@v4"
      - name: "Login to Forge Packages"
        uses: "docker/login-action@v3"
        with:
          registry: "forge.cptlobster.dev"
          username: "cptlobster"
          password: ${{ secrets.PACKAGE_TOKEN }}
      - name: "Build and Push"
        uses: "docker/build-push-action@v6"
        with:
          push: true
          file: "Dockerfile.minimal"
          tags: "forge.cptlobster.dev/cptlobster/bene-gesserit:${{ forge.ref_name }},forge.cptlobster.dev/cptlobster/bene-gesserit:latest"
      - name: "Build and Push (Full)"
        uses: "docker/build-push-action@v6"
        with:
          push: true
          file: "Dockerfile.full"
          tags: "forge.cptlobster.dev/cptlobster/bene-gesserit:${{ forge.ref_name }}-full,forge.cptlobster.dev/cptlobster/bene-gesserit:full"

  trivy:
    runs-on: docker
    container:
      image: aquasec/trivy:latest
    needs:
      - build
    steps:
      - name: "Scan Image (Minimal)"
        run: "trivy image forge.cptlobster.dev/cptlobster/bene-gesserit:${{ forge.ref_name }}"
      - name: "Scan Image (Full)"
        run: "trivy image forge.cptlobster.dev/cptlobster/bene-gesserit:${{ forge.ref_name }}-full"